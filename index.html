<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 0;
        }
        .container{
            display: flex;
            flex-direction: column;
            background-image: linear-gradient(to left bottom , yellow ,pink);
            height: 500px;
            width: auto;
        }
        h1{
            color: darkgreen;
            font-size: 60px;
            display: inline;
        }
        ul{
            list-style: none;
        }
        .inputfield{
            height: 30px;
            width: 200px;
            border-radius: 5px;
        }
        .addbutton{
            height: 30px;
            width: 60px;
            border-radius: 4px;
            font-size: 20px;
        }
        .addbutton:hover{
            cursor: pointer;
            transform: scale(1.3);
            background-color: green;
        }
        .main{
            display: flex;
            gap: 30px;
        }
        .list{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 70%;
            padding: 20px;
            margin-left: 15%;
            border-radius: 20px;
            background-image: linear-gradient(to left bottom , rgba(0, 213, 255, 0.563) ,rgba(255, 192, 194, 0.886));

        }

    </style>
</head>
<body>
    <div class="container">
        <h1>MOUNIKA's TODO LIST</h1>
       <div class="list">
        <div class="main">
            <input  class="inputfield" id="inputdata" type="text" placeholder="enter your task" oninput="inputChange()"/>
            <button class="addbutton" id="addingbutton">add</button>  
        </div>
        <div class="next">
            <ul class="tasklist" id="taskslist">

            </ul>
        </div>
        </div>
    </div>
    <script>

        function inputChange(){
            console.log("something is being entered")
        }
        let taskInput = document.getElementById("inputdata")
        let addTaskButton = document.getElementById("addingbutton")
        let taskList = document.getElementById("taskslist")

        addTaskButton.addEventListener("click",()=>{
          const taskText = taskInput.value.trim();

          if(taskInput === ''){
            alert("please enter a task !")
            return
          }

          const listItem = document.createElement('li');

          const taskSpan = document.createElement('span');
          taskSpan.textContent=taskText;
          taskSpan.style.fontSize="30px"

          const deleteButton = document.createElement('button');
          deleteButton.style.color='red';
          deleteButton.textContent='Delete';
          deleteButton.style.fontSize='20px';
          deleteButton.style.marginLeft = "100px";

          deleteButton.addEventListener("click", () => {
            taskList.removeChild(listItem);
          });

          listItem.appendChild(taskSpan);
          listItem.appendChild(deleteButton);

          taskList.appendChild(listItem);

          taskInput.value='';
        
        });
    </script>
</body>
</html>
